<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Primary SEO -->
    <title>The Pixel Lab — Professional Photographer | Portrait, Fashion & Life</title>
    <meta name="description" content="The Pixel Lab is Hanin's photography studio specialising in portrait, fashion, and lifestyle photography. Book a session starting from $100." />
    <meta name="author" content="Hanin" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://thepixellab.online/" />

    <!-- Geo / Local SEO -->
    <meta name="geo.region" content="LB-BA" />
    <meta name="geo.placename" content="Beirut, Lebanon" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thepixellab.online/" />
    <meta property="og:title" content="The Pixel Lab — Professional Photographer" />
    <meta property="og:description" content="Portrait, fashion, and lifestyle photography by Hanin. Packages starting from $100. Book your session today." />
    <meta property="og:image" content="https://thepixellab.online/og-image.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Pixel Lab — cinematic hero photography shot" />
    <meta property="og:site_name" content="The Pixel Lab" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Pixel Lab — Professional Photographer" />
    <meta name="twitter:description" content="Portrait, fashion, and lifestyle photography by Hanin. Packages starting from $100." />
    <meta name="twitter:image" content="https://thepixellab.online/og-image.jpeg" />
    <meta name="twitter:image:alt" content="The Pixel Lab — cinematic hero photography shot" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Font preconnect (reduces LCP latency by resolving DNS early) -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
    <link href="https://fonts.cdnfonts.com/css/gill-sans-2" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "ProfessionalService",
          "@id": "https://thepixellab.online/#business",
          "name": "The Pixel Lab",
          "description": "Professional photography studio by Hanin, specialising in portrait, fashion, and lifestyle photography.",
          "url": "https://thepixellab.online/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://thepixellab.online/logo.png",
            "width": 174,
            "height": 174
          },
          "image": "https://thepixellab.online/og-image.jpeg",
          "sameAs": ["https://www.instagram.com/thepixellab.lb"],
          "priceRange": "$100\u2013$350",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Beirut",
            "addressCountry": "LB"
          },
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Photography Packages",
            "itemListElement": [
              { "@type": "Offer", "name": "Minimal Package", "price": "100", "priceCurrency": "USD" },
              { "@type": "Offer", "name": "Standard Package", "price": "200", "priceCurrency": "USD" },
              { "@type": "Offer", "name": "Maximum Package", "price": "350", "priceCurrency": "USD" }
            ]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://thepixellab.online/#website",
          "url": "https://thepixellab.online/",
          "name": "The Pixel Lab",
          "publisher": { "@id": "https://thepixellab.online/#business" },
          "inLanguage": "en-US"
        },
        {
          "@type": "WebPage",
          "@id": "https://thepixellab.online/#webpage",
          "url": "https://thepixellab.online/",
          "name": "The Pixel Lab \u2014 Professional Photographer",
          "isPartOf": { "@id": "https://thepixellab.online/#website" },
          "about": { "@id": "https://thepixellab.online/#business" },
          "inLanguage": "en-US"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
